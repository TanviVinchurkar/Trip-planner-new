<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Auth</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/login.css">
</head>

<body>

  <div class="wrapper">

    <div class="left">
      <div class="overlay">
        <div class="left-content">
          <div class="logo">tripPlanner</div>
          <h1>Explore the World</h1>
          <p>Plan your trips, discover places, and travel smarter.</p>
          <button class="explore-btn btn-primary bg-white">Start Exploring</button>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="form-box">

        <div class="toggle">
          <button class="active js-tab js-login-tab" id="loginBtn">Login</button>
          <button class="js-tab js-signup-tab" id="signupBtn">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="form active">
          <h2>Welcome Back ✈️</h2>

          <div class="input-group">
            <input type="email" placeholder="Email" id="loginEmail">
          </div>
          <div class="input-group">
            <input type="password" placeholder="Password" id="loginPassword">
          </div>

          <button type="button" class="primary-btn btn-primary submit-btn">Login</button>

          <div class="divider">
            <span>or</span>
          </div>

          <button type="button" class="google-btn btn-outline">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
            </svg>
            Login with Google
          </button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" class="form">
          <h2>Create Account 🌍</h2>

          <div class="input-group">
            <input type="text" placeholder="Full Name" id="signupName">
          </div>
          <div class="input-group">
            <input type="email" placeholder="Email" id="signupEmail">
          </div>
          <div class="input-group">
            <input type="password" placeholder="Password" id="signupPassword">
          </div>

          <button type="button" class="primary-btn btn-primary submit-btn">Sign Up</button>
        </form>

      </div>
    </div>

  </div>

  <script type="module" src="script/login.js"></script>
</body>

</html>
